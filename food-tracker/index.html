<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f3f4f6;
      }
      /* Скрытие скроллбара для чистоты интерфейса */
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="flex justify-center min-h-screen items-start sm:py-8">
    <div
      class="w-full max-w-md bg-slate-50 min-h-screen sm:min-h-[850px] sm:rounded-[40px] sm:shadow-2xl flex flex-col relative overflow-hidden border border-gray-100"
    >
      <div class="p-6 pb-2 bg-slate-50 sticky top-0 z-10">
        <div class="flex justify-between items-center mb-4">
          <span
            class="text-xs font-semibold tracking-wider text-gray-400 uppercase"
            >Осознанность</span
          >
          <div class="dropdown dropdown-end">
            <div
              tabindex="0"
              role="button"
              class="btn btn-ghost btn-circle btn-sm bg-white shadow-sm"
            >
              <i
                data-lucide="more-horizontal"
                class="w-5 h-5 text-gray-600"
              ></i>
            </div>
            <ul
              tabindex="0"
              class="dropdown-content z-[20] menu p-2 shadow-lg bg-base-100 rounded-box w-52 mt-2"
            >
              <li>
                <a onclick="exportData()"
                  ><i data-lucide="download" class="w-4 h-4"></i> Экспорт
                  истории (JSON)</a
                >
              </li>
              <li>
                <a onclick="document.getElementById('import_file').click()"
                  ><i data-lucide="upload" class="w-4 h-4"></i> Импорт
                  истории</a
                >
              </li>
              <input
                type="file"
                id="import_file"
                class="hidden"
                accept=".json"
                onchange="importData(event)"
              />
            </ul>
          </div>
        </div>

        <h1 id="current-date" class="text-2xl font-bold text-gray-800">
          Воскресенье, 14 Декабря
        </h1>
        <div class="flex items-center gap-2 mt-1 text-sm">
          <span id="entries-count" class="text-gray-400">0 записей</span>
          <span class="text-gray-300">•</span>
          <span class="text-green-500 font-medium">Отличный баланс</span>
        </div>

        <div class="flex bg-gray-200/60 p-1 rounded-xl mt-4 gap-1">
          <button
            class="flex-1 py-1.5 text-sm font-medium rounded-lg bg-white text-gray-800 shadow-sm transition-all"
          >
            Сегодня
          </button>
          <button
            class="flex-1 py-1.5 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-800 transition-all opacity-60"
          >
            Неделя
          </button>
          <button
            class="flex-1 py-1.5 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-800 transition-all opacity-60"
          >
            Месяц
          </button>
        </div>
      </div>

      <div class="flex-1 px-6 pb-32 overflow-y-auto space-y-4">
        <div
          class="bg-gradient-to-r from-sky-100 to-blue-50 p-4 rounded-2xl shadow-sm border border-sky-200/40 flex justify-between items-center"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-sky-500 flex items-center justify-center text-white shadow-md shadow-sky-200"
            >
              <i data-lucide="droplet" class="w-5 h-5 fill-current"></i>
            </div>
            <div>
              <h4 class="font-bold text-slate-800 text-sm">
                Баланс воды за сегодня
              </h4>
              <p
                id="water-text"
                class="text-xs text-sky-700 font-medium mt-0.5"
              >
                Выпито: 0 стаканов
              </p>
            </div>
          </div>
          <div
            class="flex items-center gap-1.5 bg-white/80 p-1 rounded-xl border border-sky-100"
          >
            <button
              onclick="changeWater(-1)"
              class="btn btn-ghost btn-xs btn-circle text-sky-700 font-bold text-base"
            >
              -
            </button>
            <span id="water-counter" class="text-sm font-bold px-1 text-sky-900"
              >0</span
            >
            <button
              onclick="changeWater(1)"
              class="btn btn-ghost btn-xs btn-circle text-sky-700 font-bold text-base"
            >
              +
            </button>
          </div>
        </div>

        <div
          class="text-[11px] font-bold tracking-wider text-gray-400 uppercase mt-4 mb-2"
        >
          История за день
        </div>

        <div id="food-list" class="space-y-3">
          <div
            id="empty-state"
            class="text-center py-12 text-gray-400 flex flex-col items-center justify-center gap-2"
          >
            <i data-lucide="utensils" class="w-8 h-8 opacity-40"></i>
            <p class="text-sm">
              Пока ничего не записано.<br />Нажми плюс внизу, чтобы добавить
              еду!
            </p>
          </div>
        </div>
      </div>

      <div
        class="absolute bottom-6 left-0 right-0 px-6 z-10 pointer-events-none"
      >
        <div
          class="bg-white/90 backdrop-blur-md rounded-3xl shadow-xl border border-gray-100 p-2 flex justify-between items-center pointer-events-auto"
        >
          <button
            class="flex-1 py-2 flex flex-col items-center gap-1 text-indigo-600"
          >
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">Главная</span>
          </button>
          <button
            class="flex-1 py-2 flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600"
          >
            <i data-lucide="calendar" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">Календарь</span>
          </button>
          <button
            class="flex-1 py-2 flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600"
          >
            <i data-lucide="user" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">Профиль</span>
          </button>

          <button
            onclick="openAddModal()"
            class="w-12 h-12 rounded-full bg-slate-900 text-white flex items-center justify-center shadow-lg hover:bg-slate-800 transition-all ml-2"
          >
            <i data-lucide="plus" class="w-6 h-6"></i>
          </button>
        </div>
      </div>
    </div>

    <dialog id="add_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box bg-white p-6 rounded-t-3xl sm:rounded-3xl">
        <h3 class="font-bold text-lg text-gray-800 mb-4">Что ты съел(а)?</h3>

        <div class="space-y-4">
          <div>
            <label
              class="label-text text-xs font-semibold text-gray-400 uppercase"
              >Категория</label
            >
            <div class="grid grid-cols-4 gap-2 mt-1.5">
              <button
                type="button"
                onclick="setCategory('breakfast', this)"
                class="cat-btn btn btn-sm btn-outline border-gray-200 bg-orange-50 text-orange-700 border-orange-200"
              >
                Завтрак
              </button>
              <button
                type="button"
                onclick="setCategory('lunch', this)"
                class="cat-btn btn btn-sm btn-outline border-gray-200"
              >
                Обед
              </button>
              <button
                type="button"
                onclick="setCategory('dinner', this)"
                class="cat-btn btn btn-sm btn-outline border-gray-200"
              >
                Ужин
              </button>
              <button
                type="button"
                onclick="setCategory('snack', this)"
                class="cat-btn btn btn-sm btn-outline border-gray-200"
              >
                Перекус
              </button>
            </div>
          </div>

          <div>
            <label
              class="label-text text-xs font-semibold text-gray-400 uppercase"
              >Описание пищи</label
            >
            <textarea
              id="food-text"
              class="textarea textarea-bordered w-full mt-1.5 bg-slate-50 border-gray-200 text-gray-800 focus:outline-none focus:border-slate-400"
              placeholder="Например: Рис с лососем и авокадо..."
              rows="2"
            ></textarea>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="label-text text-xs font-semibold text-gray-400 uppercase"
                >Время</label
              >
              <input
                type="time"
                id="food-time"
                class="input input-bordered w-full mt-1.5 bg-slate-50 border-gray-200 text-gray-800 focus:outline-none"
              />
            </div>
            <div>
              <label
                class="label-text text-xs font-semibold text-gray-400 uppercase"
                >Фото тарелки</label
              >
              <button
                onclick="document.getElementById('photo-input').click()"
                class="btn btn-outline border-gray-200 w-full mt-1.5 btn-md bg-slate-50 text-gray-600 font-normal"
              >
                <i data-lucide="camera" class="w-4 h-4 mr-1"></i> Снимок
              </button>
              <input
                type="file"
                id="photo-input"
                accept="image/*"
                class="hidden"
                onchange="handlePhotoUpload(event)"
              />
            </div>
          </div>

          <div
            id="photo-preview-container"
            class="hidden relative w-full h-32 rounded-xl overflow-hidden mt-2"
          >
            <img id="photo-preview" src="" class="w-full h-full object-cover" />
            <button
              onclick="clearPhoto()"
              class="absolute top-2 right-2 btn btn-circle btn-xs btn-error text-white"
            >
              ✕
            </button>
          </div>
        </div>

        <div class="modal-action mt-6">
          <button onclick="closeAddModal()" class="btn btn-ghost text-gray-400">
            Отмена
          </button>
          <button
            onclick="saveFoodEntry()"
            class="btn bg-slate-900 text-white hover:bg-slate-800 px-6"
          >
            Сохранить
          </button>
        </div>
      </div>
    </dialog>

    <script>
      // Конфигурация категорий для красивого рендеринга
      const categories = {
        breakfast: {
          title: "Завтрак",
          icon: "sun",
          color: "bg-orange-500 text-white",
        },
        lunch: {
          title: "Обед",
          icon: "cloud-sun",
          color: "bg-amber-500 text-white",
        },
        dinner: {
          title: "Ужин",
          icon: "moon",
          color: "bg-indigo-900 text-white",
        },
        snack: {
          title: "Перекус",
          icon: "leaf",
          color: "bg-emerald-500 text-white",
        },
      };

      // Состояние приложения
      let currentCategory = "breakfast";
      let currentPhotoBase64 = null;
      let foodEntries = JSON.parse(localStorage.getItem("foodEntries")) || [];
      let waterLogs = JSON.parse(localStorage.getItem("waterLogs")) || {};

      // Форматирование текущей даты для шапки
      function updateHeaderDate() {
        const options = { weekday: "long", month: "long", day: "numeric" };
        let dateStr = new Date().toLocaleDateString("ru-RU", options);
        // Делаем первую букву заглавной
        dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        document.getElementById("current-date").innerText = dateStr;
      }

      // Получить текущую дату в формате YYYY-MM-DD
      function getTodayKey() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      // Логика трекера воды
      function initWater() {
        const today = getTodayKey();
        const count = waterLogs[today] || 0;
        document.getElementById("water-counter").innerText = count;
        document.getElementById("water-text").innerText =
          `Выпито: ${count} стакан${getGlassEnding(count)}`;
      }

      function changeWater(amount) {
        const today = getTodayKey();
        let count = waterLogs[today] || 0;
        count = Math.max(0, count + amount);
        waterLogs[today] = count;
        localStorage.setItem("waterLogs", JSON.stringify(waterLogs));
        initWater();
      }

      function getGlassEnding(count) {
        if (count === 1) return "";
        if (count > 1 && count < 5) return "а";
        return "ов";
      }

      // Открытие и закрытие модалки добавления еды
      function openAddModal() {
        const now = new Date();
        const currentTime = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
        document.getElementById("food-time").value = currentTime;
        document.getElementById("food-text").value = "";
        clearPhoto();
        setCategory("breakfast", document.querySelectorAll(".cat-btn")[0]);
        document.getElementById("add_modal").showModal();
      }

      function closeAddModal() {
        document.getElementById("add_modal").close();
      }

      // Выбор категории в форме
      function setCategory(cat, element) {
        currentCategory = cat;
        document.querySelectorAll(".cat-btn").forEach((btn) => {
          btn.className =
            "cat-btn btn btn-sm btn-outline border-gray-200 text-gray-600";
        });
        // Назначаем класс выбранной кнопки под стиль daisyUI
        if (cat === "breakfast")
          element.className =
            "cat-btn btn btn-sm bg-orange-500 text-white border-none";
        if (cat === "lunch")
          element.className =
            "cat-btn btn btn-sm bg-amber-500 text-white border-none";
        if (cat === "dinner")
          element.className =
            "cat-btn btn btn-sm bg-indigo-900 text-white border-none";
        if (cat === "snack")
          element.className =
            "cat-btn btn btn-sm bg-emerald-500 text-white border-none";
      }

      // Обработка и сжатие фотографии (Base64)
      function handlePhotoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          currentPhotoBase64 = e.target.result;
          document.getElementById("photo-preview").src = currentPhotoBase64;
          document
            .getElementById("photo-preview-container")
            .classList.remove("hidden");
        };
        reader.readAsDataURL(file);
      }

      function clearPhoto() {
        currentPhotoBase64 = null;
        document.getElementById("photo-input").value = "";
        document
          .getElementById("photo-preview-container")
          .classList.add("hidden");
      }

      // Сохранение записи в LocalStorage
      function saveFoodEntry() {
        const text = document.getElementById("food-text").value.trim();
        const time = document.getElementById("food-time").value;
        const today = getTodayKey();

        if (!text && !currentPhotoBase64) {
          alert("Пожалуйста, напиши пару слов о еде или сделай фото!");
          return;
        }

        const newEntry = {
          id: Date.now().toString(),
          date: today,
          time: time,
          text: text || "Прием пищи без описания",
          category: currentCategory,
          photo: currentPhotoBase64,
        };

        foodEntries.push(newEntry);
        // Сортировка по времени
        foodEntries.sort((a, b) => a.time.localeCompare(b.time));

        localStorage.setItem("foodEntries", JSON.stringify(foodEntries));

        closeAddModal();
        renderFoodList();
      }

      // Удаление записи
      function deleteEntry(id) {
        if (confirm("Удалить эту запись из дневника?")) {
          foodEntries = foodEntries.filter((entry) => entry.id !== id);
          localStorage.setItem("foodEntries", JSON.stringify(foodEntries));
          renderFoodList();
        }
      }

      // Рендеринг списка приемов пищи
      function renderFoodList() {
        const listContainer = document.getElementById("food-list");
        const today = getTodayKey();

        // Фильтруем только сегодняшние записи
        const todaysEntries = foodEntries.filter(
          (entry) => entry.date === today,
        );

        document.getElementById("entries-count").innerText =
          `${todaysEntries.length} записей`;

        if (todaysEntries.length === 0) {
          document.getElementById("empty-state").classList.remove("hidden");
          // Очищаем старые элементы, оставляя empty state
          const children = Array.from(listContainer.children);
          children.forEach((child) => {
            if (child.id !== "empty-state") child.remove();
          });
          lucide.createIcons();
          return;
        }

        document.getElementById("empty-state").classList.add("hidden");

        // Удаляем старые карточки перед перерендером
        const cards = listContainer.querySelectorAll(".food-card");
        cards.forEach((card) => card.remove());

        todaysEntries.forEach((entry) => {
          const catConfig = categories[entry.category] || categories.snack;

          const card = document.createElement("div");
          card.className =
            "food-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100/80 flex justify-between items-center gap-4 transition-all hover:shadow-md relative group";

          card.innerHTML = `
                    <div class="flex items-center gap-4 flex-1">
                        <div class="w-11 h-11 rounded-full ${catConfig.color} flex items-center justify-center shrink-0 shadow-sm">
                            <i data-lucide="${catConfig.icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-gray-800 text-[15px] break-words leading-tight">${entry.text}</h3>
                            <p class="text-xs text-gray-400 mt-1 flex items-center gap-1">
                                <span>${catConfig.title}</span>
                                <span>•</span>
                                <span>${entry.time}</span>
                            </p>
                        </div>
                    </div>
                    
                    ${
                      entry.photo
                        ? `
                        <div class="w-14 h-14 rounded-xl overflow-hidden shrink-0 border border-gray-100 shadow-inner">
                            <img src="${entry.photo}" class="w-full h-full object-cover">
                        </div>
                    `
                        : ""
                    }

                    <button onclick="deleteEntry('${entry.id}')" class="btn btn-ghost btn-xs btn-circle text-gray-300 hover:text-red-500">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;

          listContainer.appendChild(card);
        });

        // Обновляем иконки Lucide для новых элементов
        lucide.createIcons();
      }

      // ЭКСПОРТ ДАННЫХ В JSON (Резервное копирование)
      function exportData() {
        const dataToExport = {
          foodEntries: foodEntries,
          waterLogs: waterLogs,
          exportedAt: new Date().toISOString(),
        };

        const dataStr =
          "data:text/json;charset=utf-8," +
          encodeURIComponent(JSON.stringify(dataToExport, null, 2));
        const downloadAnchor = document.createElement("a");
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute(
          "download",
          `food_tracker_backup_${getTodayKey()}.json`,
        );
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
      }

      // ИМПОРТ ДАННЫХ ИЗ JSON
      function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const parsed = JSON.parse(e.target.result);
            if (parsed.foodEntries || parsed.waterLogs) {
              foodEntries = parsed.foodEntries || [];
              waterLogs = parsed.waterLogs || {};
              localStorage.setItem("foodEntries", JSON.stringify(foodEntries));
              localStorage.setItem("waterLogs", JSON.stringify(waterLogs));
              alert("История успешно импортирована!");
              // Перезапуск интерфейса
              initWater();
              renderFoodList();
            } else {
              alert("Неверный формат файла бэкапа.");
            }
          } catch (err) {
            alert("Ошибка при чтении файла JSON.");
          }
        };
        reader.readAsText(file);
      }

      // Запуск при загрузке страницы
      updateHeaderDate();
      initWater();
      renderFoodList();
      lucide.createIcons();
    </script>
  </body>
</html>
