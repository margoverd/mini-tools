<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Проверка текста</title>

    <style>
      body {
        font-family: Inter, sans-serif;
        background-color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 15px; 
        box-sizing: border-box;
      }

      .container {
        width: 100%; 
        max-width: 650px; 
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        box-sizing: border-box;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #e74c3c;
        font-size: 22px;
      }

      textarea {
        width: 100%;
        height: 200px;
        padding: 15px;
        font-size: 14px;
        border-radius: 8px;
        border: 1px solid #ccc;
        resize: vertical;
        outline: none;
        box-sizing: border-box;
      }

      .stats {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        font-size: 14px;
      }

      .stat-block span {
        font-weight: bold;
        font-size: 16px;
        display: block;
        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Проверка текста</h1>

      <textarea
        id="textInput"
        placeholder="Вставьте текст для проверки..."
      ></textarea>

      <div class="stats">
        <div class="stat-block">
          Символов
          <span id="charCount">0</span>
        </div>

        <div class="stat-block">
          Без пробелов
          <span id="charNoSpace">0</span>
        </div>

        <div class="stat-block">
          Слов
          <span id="wordCount">0</span>
        </div>

        <div class="stat-block">
          Предложений
          <span id="sentenceCount">0</span>
        </div>

        <div class="stat-block">
          Абзацев
          <span id="paragraphCount">0</span>
        </div>

        <div class="stat-block">
          Время чтения
          <span id="readingTime">0 сек</span>
        </div>
      </div>
    </div>

    <script>
      const textInput = document.getElementById("textInput");
      const charCount = document.getElementById("charCount");
      const charNoSpace = document.getElementById("charNoSpace");
      const wordCount = document.getElementById("wordCount");
      const sentenceCount = document.getElementById("sentenceCount");
      const paragraphCount = document.getElementById("paragraphCount");
      const readingTime = document.getElementById("readingTime");

      function updateStats() {
        const text = textInput.value;

        localStorage.setItem("savedText", text);

        charCount.textContent = text.length;
        charNoSpace.textContent = text.replace(/\s/g, "").length;

        const words = text
          .trim()
          .split(/\s+/)
          .filter((word) => word.length > 0);
        const wordTotal = text.trim() === "" ? 0 : words.length;
        wordCount.textContent = wordTotal;

        const sentences = text
          .split(/[.!?]+/)
          .filter((s) => s.trim().length > 0);
        sentenceCount.textContent = sentences.length;

        const paragraphs = text.split(/\n+/).filter((p) => p.trim().length > 0);
        paragraphCount.textContent = paragraphs.length;

        const minutes = wordTotal / 200;
        const seconds = Math.round(minutes * 60);

        readingTime.textContent =
          seconds < 60
            ? seconds + " сек"
            : Math.floor(seconds / 60) + " мин " + (seconds % 60) + " сек";
      }

      textInput.addEventListener("input", updateStats);

      window.onload = function () {
        const saved = localStorage.getItem("savedText");
        if (saved) {
          textInput.value = saved;
          updateStats();
        }
      };
    </script>
  </body>
</html>
